general {
    ignore_empty_input = true
    hide_cursor = true
}

# ── Background: pure codec black (no wallpaper, no blur) ─────────
background {
    monitor =
    color = rgba(1, 8, 1, 1)
}

animations {
    enabled = false
}

# ── Codec frame — header ─────────────────────────────────────────
label {
    monitor =
    text = ╔══════════════════════════════════════════════════════════╗
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 295
    halign = center
    valign = center
}
label {
    monitor =
    text = ║  F O X H O U N D   S P E C I A L   F O R C E S   U N I T  ║
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 277
    halign = center
    valign = center
}
label {
    monitor =
    text = ╠══════════════════════════════════════════════════════════╣
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 259
    halign = center
    valign = center
}

# ── Clock ─────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M:%S"
    color = rgba(0, 255, 65, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 255, 65, 0.15)
    shadow_size = 10
}

# ── Date ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +"%A  ·  %d %B %Y" | tr '[:lower:]' '[:upper:]'
    color = rgba(0, 255, 65, 0.5)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 68
    halign = center
    valign = center
}

# ── Codec frame — character nameplate ────────────────────────────
label {
    monitor =
    text = ╠══════════════════════════════════════════════════════════╣
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 36
    halign = center
    valign = center
}
label {
    monitor =
    text = ║              S O L I D   S N A K E                      ║
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 16
    halign = center
    valign = center
}
label {
    monitor =
    text = ║   FREQ  ▓▓▓▓▓▒▒▒░░░░  140.85 MHz                       ║
    color = rgba(0, 255, 65, 0.75)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -4
    halign = center
    valign = center
}
label {
    monitor =
    text = ╚══════════════════════════════════════════════════════════╝
    color = rgba(0, 255, 65, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -24
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────────
input-field {
    monitor =
    size = 600, 65
    position = 0, -120
    halign = center
    valign = center

    outline_thickness = 2
    outer_color = rgba(0, 255, 65, 0.7)
    inner_color = rgba(1, 8, 1, 1.0)
    font_family = JetBrainsMono Nerd Font
    font_color = rgba(0, 255, 65, 1.0)

    placeholder_text = <i>▌  ENTER CODEC FREQUENCY</i>
    check_color = rgba(0, 204, 170, 1.0)
    fail_color = rgba(255, 34, 0, 1.0)
    fail_text = ⚠  ACCESS DENIED  ·  ATTEMPT $ATTEMPTS

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
}

# ── Auth status ───────────────────────────────────────────────────
label {
    monitor =
    text = ◈  AUTHENTICATION REQUIRED  ◈
    color = rgba(0, 255, 65, 0.4)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -208
    halign = center
    valign = center
}

# ── Corner watermarks ─────────────────────────────────────────────
label {
    monitor =
    text = FOXHOUND
    color = rgba(0, 255, 65, 0.18)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 30, 20
    halign = left
    valign = bottom
}
label {
    monitor =
    text = TACTICAL ESPIONAGE ACTION
    color = rgba(0, 255, 65, 0.18)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -30, 20
    halign = right
    valign = bottom
}

auth {
    fingerprint:enabled = false
}

source = ~/.local/state/omarchy/toggles/hyprlock.conf
